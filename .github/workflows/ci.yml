name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: hexlet-components/hello-from-hexlet-action
        uses: hexlet-components/hello-from-hexlet-action@release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (make setup)
        run: make setup

      - name: Run linter (make lint)
        run: make lint

      - name: Run tests (make test)
        run: make test
